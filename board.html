<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Value Board</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f0ece3;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* ── Board mode ─────────────────────────────────────────────────────────── */

#board-wrap {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#board {
  width: 650px;
  height: 500px;
  position: relative;
  transform-origin: center center;
  background: #eae6dc;
  border-radius: 22px;
  box-shadow:
    0 4px 32px rgba(0,0,0,0.10),
    0 1px 4px rgba(0,0,0,0.06);
}

/* ── Slots ──────────────────────────────────────────────────────────────── */

.slot {
  position: absolute;
  width: 80px;
  height: 30px;
  border-radius: 9px;
  background: rgba(0,0,0,0.05);
  border: 1px solid rgba(0,0,0,0.09);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
  transition: border-color 0.18s, box-shadow 0.18s;
  z-index: 1;
}

.slot::after {
  content: '+';
  font-size: 11px;
  color: rgba(0,0,0,0.18);
  pointer-events: none;
  transition: color 0.18s;
}

.slot:hover                { border-color: rgba(0,0,0,0.2); z-index: 10; }
.slot:hover::after         { color: rgba(0,0,0,0.35); }

.slot.active-target {
  border-color: rgba(100,80,200,0.35);
  box-shadow: 0 0 14px rgba(100,80,200,0.12);
}
.slot.active-target::after { display: none; }

.slot.occupied             { background: transparent; border-color: transparent; box-shadow: none; }
.slot.occupied::after      { display: none; }
.slot.occupied:hover       { border-color: rgba(0,0,0,0.08); z-index: 10; }

/* ── Card image inside slot ─────────────────────────────────────────────── */

.slot-img {
  position: absolute;
  width: 320px;
  height: 120px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  object-fit: contain;
  display: block;
  pointer-events: none;
  transition: transform 0.18s, opacity 0.18s;
}

.slot.occupied:hover .slot-img {
  transform: translate(-50%, -50%) scale(0.9);
  opacity: 0.75;
}

/* ── Picker panel ───────────────────────────────────────────────────────── */

#picker {
  position: absolute;
  background: rgba(255, 253, 249, 0.97);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 16px;
  padding: 12px;
  display: none;
  flex-wrap: wrap;
  gap: 10px;
  width: 284px;
  z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.08);
  -webkit-backdrop-filter: blur(24px);
  backdrop-filter: blur(24px);
}

.picker-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  width: 80px;
  transition: transform 0.12s;
  user-select: none;
}
.picker-item:hover         { transform: scale(1.08); }
.picker-item.used          { opacity: 0.2; cursor: not-allowed; pointer-events: none; }

.picker-item img {
  width: 80px;
  height: 30px;
  object-fit: contain;
  display: block;
  transform: scale(1.2);
  transform-origin: center center;
}

.picker-item span {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.38);
  text-align: center;
  line-height: 1;
}

/* ── Central view canvas ────────────────────────────────────────────────── */

#central-canvas {
  display: none;
  position: fixed;
  inset: 0;
  overflow: hidden;
}

.token {
  position: absolute;
  width: 320px;
  height: 120px;
  opacity: 0;
  transform: scale(0.78);
  transition: opacity 0.45s ease, transform 0.45s ease;
  pointer-events: none;
}

.token.visible {
  opacity: 1;
  transform: scale(1);
}

.token img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* ── Status badge ───────────────────────────────────────────────────────── */

#status-badge {
  position: fixed;
  bottom: 16px;
  right: 16px;
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.28);
  background: rgba(255,255,255,0.6);
  padding: 5px 10px;
  border-radius: 20px;
  z-index: 1000;
  pointer-events: none;
  transition: color 0.3s;
}
#status-badge.disconnected { color: rgba(200,60,60,0.55); }
</style>
</head>
<body>

<div id="board-wrap">
  <div id="board">
    <div id="picker"></div>
  </div>
</div>

<div id="central-canvas"></div>
<div id="status-badge">connecting…</div>

<script>
/*
 * ═══════════════════════════════════════════════════════════════════════════
 * URL PARAMETERS
 * ═══════════════════════════════════════════════════════════════════════════
 *   ?mode=central   open as the central aggregation view
 *   ?host=x.x.x.x  WebSocket server host  (default: localhost)
 *   ?port=8080      WebSocket server port  (default: 8080)
 *
 *   Board view:    board.html
 *   Central view:  board.html?mode=central
 *   Remote board:  board.html?host=192.168.1.5
 *
 * ═══════════════════════════════════════════════════════════════════════════
 * IMAGE PATHS
 * ═══════════════════════════════════════════════════════════════════════════
 *   Images are loaded via absolute file:// URLs. Update IMG_BASE if the
 *   folder moves, or replace with a relative/HTTP URL when serving from
 *   a web server.
 *
 * ═══════════════════════════════════════════════════════════════════════════
 * NFC INTEGRATION
 * ═══════════════════════════════════════════════════════════════════════════
 *   A physical NFC reader bridge should connect to the same WS server and
 *   send board-mode messages on behalf of the board it is attached to:
 *
 *     { type: 'place',  slotIndex: 2, cardName: 'Privacy' }
 *     { type: 'remove', slotIndex: 2 }
 *
 *   The server relays these to all clients unchanged.
 * ═══════════════════════════════════════════════════════════════════════════
 */

// ── Config ────────────────────────────────────────────────────────────────
const PARAMS  = new URLSearchParams(location.search);
const MODE    = PARAMS.get('mode') === 'central' ? 'central' : 'board';
const WS_HOST = PARAMS.get('host') || 'localhost';
const WS_PORT = PARAMS.get('port') || '8080';
const WS_URL  = `ws://${WS_HOST}:${WS_PORT}`;

// ── Shared card definitions ───────────────────────────────────────────────
const IMG_BASE = 'file:///C:/Users/vdlma/OneDrive%20-%20University%20of%20Twente/Illustraties/values%20cut%20out/';

const CARDS = [
  { name: 'Privacy',      image: IMG_BASE + 'privacy.png'      },
  { name: 'Equality',     image: IMG_BASE + 'equality.png'     },
  { name: 'Freedom',      image: IMG_BASE + 'freedom.png'      },
  { name: 'Safety',       image: IMG_BASE + 'safety.png'       },
  { name: 'Common Good',  image: IMG_BASE + 'commongood.png'   },
  { name: 'Humane',       image: IMG_BASE + 'humane.png'       },
  { name: 'Transparency', image: IMG_BASE + 'transparency.png' },
];

// ── DOM refs ──────────────────────────────────────────────────────────────
const boardWrap     = document.getElementById('board-wrap');
const boardEl       = document.getElementById('board');
const pickerEl      = document.getElementById('picker');
const centralCanvas = document.getElementById('central-canvas');
const statusBadge   = document.getElementById('status-badge');

// ── Mode bootstrap ────────────────────────────────────────────────────────
if (MODE === 'central') {
  boardWrap.style.display = 'none';
  centralCanvas.style.display = 'block';
  document.title = 'Central View';
} else {
  initBoard();
}

connectWS();

// ═══════════════════════════════════════════════════════════════════════════
// WEBSOCKET  (shared by both modes)
// ═══════════════════════════════════════════════════════════════════════════

let ws             = null;
let reconnectTimer = null;

function connectWS() {
  clearTimeout(reconnectTimer);
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', mode: MODE }));
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }
    handleMessage(msg);
  };

  ws.onclose = () => {
    setStatus('disconnected');
    reconnectTimer = setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();
}

function sendWS(msg) {
  if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

function handleMessage(msg) {
  if (MODE === 'board') {
    if (msg.type === 'assigned') {
      setStatus(msg.boardId);
      // Re-broadcast full local state so the central view stays in sync
      // after a reconnect (board gets a fresh ID but still has local state).
      slotAssignments.forEach((card, i) => {
        if (card) sendWS({ type: 'place', slotIndex: i, cardName: card.name });
      });
    }
    return;
  }

  // Central view
  switch (msg.type) {
    case 'full_state':       handleFullState(msg.boards);                         break;
    case 'place':            addToken(msg.boardId, msg.slotIndex, msg.cardName);  break;
    case 'remove':           removeToken(msg.boardId, msg.slotIndex);             break;
    case 'board_disconnect': removeBoard(msg.boardId);                            break;
  }
}

function setStatus(text) {
  statusBadge.textContent = text;
  statusBadge.classList.toggle('disconnected', text === 'disconnected');
}

// ═══════════════════════════════════════════════════════════════════════════
// BOARD MODE
// ═══════════════════════════════════════════════════════════════════════════

const SLOT_POSITIONS = [
  [ 65,  95], [285,  95], [505,  95],  // Row 1
  [175, 195], [395, 195],              // Row 2
  [175, 295], [395, 295],              // Row 3
  [ 65, 395], [285, 395], [505, 395], // Row 4
];

const slotAssignments = new Array(SLOT_POSITIONS.length).fill(null);
let activeSlot = null;
let slotEls    = [];

function initBoard() {
  fitBoard();
  window.addEventListener('resize', fitBoard);
  document.addEventListener('click', hidePicker);

  slotEls = SLOT_POSITIONS.map(([x, y], i) => {
    const el = document.createElement('div');
    el.className = 'slot';
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.dataset.index = i;
    el.addEventListener('click', onSlotClick);
    boardEl.appendChild(el);
    return el;
  });
}

function fitBoard() {
  const s = Math.min(window.innerWidth / 650, window.innerHeight / 500) * 0.95;
  boardEl.style.transform = `scale(${s})`;
}

function renderSlot(i) {
  const el   = slotEls[i];
  const card = slotAssignments[i];
  el.innerHTML = '';

  if (card) {
    el.classList.add('occupied');
    const img = document.createElement('img');
    img.className = 'slot-img';
    img.src = card.image;
    img.alt = card.name;
    el.appendChild(img);
  } else {
    el.classList.remove('occupied');
  }
}

function onSlotClick(e) {
  e.stopPropagation();
  const i = +this.dataset.index;

  if (slotAssignments[i]) { removeCard(i); hidePicker(); return; }
  if (activeSlot === i)   { hidePicker();  return; }
  showPicker(i);
}

const PICKER_W = 284, PICKER_H = 170;

function showPicker(slotIndex) {
  if (activeSlot !== null) slotEls[activeSlot].classList.remove('active-target');
  activeSlot = slotIndex;
  slotEls[slotIndex].classList.add('active-target');

  const [x, y] = SLOT_POSITIONS[slotIndex];
  const px = Math.min(Math.max(x - (PICKER_W - 80) / 2, 8), 650 - PICKER_W - 8);
  const py = (y + 36 + PICKER_H > 500) ? y - PICKER_H - 6 : y + 36;

  pickerEl.style.left    = px + 'px';
  pickerEl.style.top     = py + 'px';
  pickerEl.style.display = 'flex';
  pickerEl.innerHTML     = '';

  CARDS.forEach(card => {
    const item = document.createElement('div');
    item.className = 'picker-item';

    const img = document.createElement('img');
    img.src = card.image;
    img.alt = card.name;

    const label = document.createElement('span');
    label.textContent = card.name;

    item.appendChild(img);
    item.appendChild(label);

    if (slotAssignments.some(c => c && c.name === card.name)) item.classList.add('used');

    item.addEventListener('click', e => {
      e.stopPropagation();
      placeCard(activeSlot, card);
      hidePicker();
    });

    pickerEl.appendChild(item);
  });
}

function hidePicker() {
  if (activeSlot !== null) { slotEls[activeSlot].classList.remove('active-target'); activeSlot = null; }
  pickerEl.style.display = 'none';
}

function placeCard(slotIndex, card) {
  slotAssignments[slotIndex] = card;
  renderSlot(slotIndex);
  sendWS({ type: 'place', slotIndex, cardName: card.name });
}

function removeCard(slotIndex) {
  slotAssignments[slotIndex] = null;
  renderSlot(slotIndex);
  sendWS({ type: 'remove', slotIndex });
}

// ═══════════════════════════════════════════════════════════════════════════
// CENTRAL VIEW
// ═══════════════════════════════════════════════════════════════════════════

const TOKEN_W = 320, TOKEN_H = 120, MARGIN = 28;

const tokenPositions = new Map(); // key → { x, y }
const tokenEls       = new Map(); // key → DOM element

function tKey(boardId, slotIndex) { return `${boardId}|${slotIndex}`; }

function handleFullState(boards) {
  for (const [boardId, slots] of Object.entries(boards)) {
    for (const [slotIndex, cardName] of Object.entries(slots)) {
      addToken(boardId, +slotIndex, cardName);
    }
  }
  setStatus('central view');
}

function addToken(boardId, slotIndex, cardName) {
  const key = tKey(boardId, slotIndex);
  if (tokenEls.has(key)) return;

  const card = CARDS.find(c => c.name === cardName);
  if (!card) return;

  const pos = findFreePosition();
  tokenPositions.set(key, pos);

  const el = document.createElement('div');
  el.className = 'token';
  el.style.left = pos.x + 'px';
  el.style.top  = pos.y + 'px';

  const img = document.createElement('img');
  img.src = card.image;
  img.alt = cardName;
  el.appendChild(img);

  centralCanvas.appendChild(el);
  tokenEls.set(key, el);

  // Double rAF ensures the initial opacity:0 state is painted before transition
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
}

function removeToken(boardId, slotIndex) {
  const key = tKey(boardId, slotIndex);
  const el  = tokenEls.get(key);
  if (!el) return;

  el.classList.remove('visible');
  el.addEventListener('transitionend', () => {
    el.remove();
    tokenEls.delete(key);
    tokenPositions.delete(key);
  }, { once: true });
}

function removeBoard(boardId) {
  for (const key of [...tokenEls.keys()]) {
    if (key.startsWith(boardId + '|')) {
      const slotIndex = +key.split('|')[1];
      removeToken(boardId, slotIndex);
    }
  }
}

// Random non-colliding placement. Falls back to a random spot if no free
// position is found within 300 attempts (very unlikely with 2-5 boards).
function findFreePosition() {
  const cw = window.innerWidth;
  const ch = window.innerHeight;

  for (let i = 0; i < 300; i++) {
    const x = MARGIN + Math.random() * (cw - TOKEN_W - MARGIN * 2);
    const y = MARGIN + Math.random() * (ch - TOKEN_H - MARGIN * 2);

    let free = true;
    for (const pos of tokenPositions.values()) {
      if (x < pos.x + TOKEN_W + MARGIN &&
          x + TOKEN_W + MARGIN > pos.x &&
          y < pos.y + TOKEN_H + MARGIN &&
          y + TOKEN_H + MARGIN > pos.y) {
        free = false;
        break;
      }
    }

    if (free) return { x, y };
  }

  return {
    x: MARGIN + Math.random() * (cw - TOKEN_W - MARGIN * 2),
    y: MARGIN + Math.random() * (ch - TOKEN_H - MARGIN * 2),
  };
}
</script>
</body>
</html>
